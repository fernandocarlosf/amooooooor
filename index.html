<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Páscoa, Meu Amor 🐰💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: white;
}

.container {
    text-align: center;
    max-width: 500px;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 2.5em;
}

p {
    font-size: 1.2em;
    margin-top: 15px;
}

.slideshow {
    position: relative;
    width: 250px;
    height: 250px;
    margin: 20px auto;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
}

.slide.active {
    opacity: 1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Feliz Páscoa, meu amor 🐰💖</h1>

    <div class="slideshow">
        <img class="slide active" src="https://via.placeholder.com/250?text=Foto+1">
        <img class="slide" src="https://via.placeholder.com/250?text=Foto+2">
        <img class="slide" src="https://via.placeholder.com/250?text=Foto+3">
    </div>

    <p>
        Assim como a Páscoa simboliza recomeço, você é o meu motivo diário de felicidade.
        Cada momento ao seu lado é um presente que eu nunca quero perder.
    </p>

    <p>
        Te amo hoje, amanhã e sempre ❤️
    </p>
</div>

<div class="hearts" id="hearts"></div>

<script>
// slideshow
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 3000);

// corações animados
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerText = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
    document.getElementById('hearts').appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
