<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Para você, Amor 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #ffdde1, #ee9ca7);
    color: white;
    text-align: center;
}

/* tela inicial */
#start {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    cursor: pointer;
}

/* conteúdo principal */
#main {
    display: none;
    padding: 20px;
}

.slideshow {
    position: relative;
    width: 250px;
    height: 250px;
    margin: 20px auto;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
}

.slide.active {
    opacity: 1;
}

#text {
    font-size: 1.2em;
    min-height: 80px;
    margin-top: 20px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff6f91;
    color: white;
    font-size: 1em;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="start" onclick="startExperience()">
    💖 Clique para abrir sua surpresa 💖
</div>

<!-- CONTEÚDO -->
<div id="main">
    <h1>💖🐰Feliz Páscoa, Amor 🐰💖</h1>

    <!-- FOTOS -->
    <div class="slideshow">
        <img class="slide active" src="https://via.placeholder.com/250?text=Foto+1">
        <img class="slide" src="https://via.placeholder.com/250?text=Foto+2">
        <img class="slide" src="https://via.placeholder.com/250?text=Foto+3">
    </div>

    <!-- TEXTO -->
    <div id="text"></div>

    <!-- BOTÃO FINAL -->
    <button onclick="showFinal()">💌 Ver mensagem final</button>

    <div id="final" style="display:none; margin-top:20px;">
        <h2>Você é o melhor presente da minha vida ❤️</h2>
        <p>Te amo hoje, amanhã e sempre 💖 Sofri para achar o Galak, mas achei 💖 </p>
    </div>
</div>

<script>
// iniciar experiência
function startExperience() {
    document.getElementById("start").style.display = "none";
    document.getElementById("main").style.display = "block";
    startTyping();
}

// efeito digitação
const messages = [
    "Desde que você entrou na minha vida...",
    "Tudo ficou mais leve, mais bonito...",
    "E muito mais feliz 💖",
    "Cada momento ao seu lado vale tudo pra mim..."
];

let msgIndex = 0;
let charIndex = 0;

function startTyping() {
    const element = document.getElementById("text");
    const currentMessage = messages[msgIndex];

    if (charIndex < currentMessage.length) {
        element.innerHTML += currentMessage.charAt(charIndex);
        charIndex++;
        setTimeout(startTyping, 50);
    } else {
        setTimeout(() => {
            element.innerHTML = "";
            charIndex = 0;
            msgIndex++;
            if (msgIndex < messages.length) {
                startTyping();
            }
        }, 2000);
    }
}

// slideshow
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 3000);

// mensagem final
function showFinal() {
    document.getElementById("final").style.display = "block";
}
</script>

</body>
</html>
